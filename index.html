<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIN Lookup</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 40px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
    }

    .status {
      margin: 12px 0 20px;
      color: #666;
    }

    .card {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 20px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .row:last-child {
      border-bottom: none;
    }

    .label {
      font-weight: bold;
      min-width: 220px;
      color: #222;
    }

    .value {
      flex: 1;
      text-align: right;
      color: #555;
    }

    .error {
      color: #c62828;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vehicle Details</h1>
    <p>Hardcoded VIN is loaded automatically from Render.</p>

    <div id="status" class="status">Loading vehicle data...</div>
    <div id="result"></div>
  </div>

  <script>
    const vin = "1HGCM82633A004352";
    const apiBase = "https://vinlookup-backend.onrender.com";

    async function loadVehicle() {
      const status = document.getElementById("status");
      const result = document.getElementById("result");

      try {
        const response = await fetch(`${apiBase}/api/vin/${vin}`);

        if (!response.ok) {
          throw new Error(`Backend returned ${response.status}`);
        }

        const data = await response.json();

        result.innerHTML = `
          <div class="card">
            <div class="row"><div class="label">Vehicle Brand Name</div><div class="value">${data.vehicleBrandName ?? "-"}</div></div>
            <div class="row"><div class="label">Vehicle Color</div><div class="value">${data.vehicleColor ?? "-"}</div></div>
            <div class="row"><div class="label">Vehicle Drive</div><div class="value">${data.vehicleDrive ?? "-"}</div></div>
            <div class="row"><div class="label">Chassis No</div><div class="value">${data.chassisNo ?? "-"}</div></div>
            <div class="row"><div class="label">Year of Built</div><div class="value">${data.yearOfBuilt ?? "-"}</div></div>
            <div class="row"><div class="label">Country of Origin</div><div class="value">${data.countryOfOrigin ?? "-"}</div></div>
            <div class="row"><div class="label">Vehicle Model</div><div class="value">${data.vehicleModel ?? "-"}</div></div>
            <div class="row"><div class="label">Vehicle Type</div><div class="value">${data.vehicleType ?? "-"}</div></div>
          </div>
        `;

        status.textContent = `Loaded VIN: ${vin}`;
      } catch (error) {
        status.innerHTML = `<span class="error">${error.message}</span>`;
      }
    }

    loadVehicle();
  </script>
</body>
</html>
